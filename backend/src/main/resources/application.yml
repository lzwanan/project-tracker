spring:
  profiles:
    active: local

server:
  port: 8080

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.project.tracker.entity
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
