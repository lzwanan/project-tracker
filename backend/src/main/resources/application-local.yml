spring:
  datasource:
    url: jdbc:h2:file:./data/tracker;MODE=MySQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  sql:
    init:
      mode: always
      schema-locations: classpath:schema-h2.sql
      data-locations: classpath:data-h2.sql

system:
  backup:
    cron: "0 0 0,12 * * *"
    dir: ./backup
